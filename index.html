<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="./logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="منصة أساس التعليمية - حاسبة معدل BTEC الاحترافية" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>أساس مهني | حاسبة معدل BTEC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
      onerror="this.remove()"
    />
    <style>
      /* Inline loading screen — shows before JS loads */
      body { margin: 0; background: #EEF3F7; }
      #app-loader {
        position: fixed;
        top: 0; right: 0; bottom: 0; left: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #EEF3F7;
        font-family: 'Cairo', 'Segoe UI', Arial, sans-serif;
        direction: rtl;
        z-index: 9999;
      }
      #app-loader .loader-circle {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(47,86,115,0.15);
        border-top-color: #2F5673;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
        margin-bottom: 16px;
      }
      #app-loader p {
        color: #4A6170;
        font-size: 15px;
        margin: 0;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Loading indicator shown before React mounts -->
    <div id="app-loader">
      <div class="loader-circle"></div>
      <p>جارٍ التحميل...</p>
    </div>

    <div id="root"></div>

    <script>
      // Remove loader once React mounts
      window.__removeLoader = function() {
        var el = document.getElementById('app-loader');
        if (el) el.parentNode.removeChild(el);
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
