<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>أساس مهني | حاسبة معدل BTEC</title>
    <meta name="description" content="منصة أساس التعليمية — احسب معدل BTEC بدقة للأول ثانوي والتوجيهي. تطوير الأستاذ أحمد دومي." />
    <meta name="author" content="أحمد دومي" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical — set VITE_SITE_URL in Vercel env vars to your custom domain -->
    <!-- e.g. VITE_SITE_URL=https://www.asasmehani.com -->
    <link rel="canonical" href="%VITE_SITE_URL%" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="%VITE_SITE_URL%" />
    <meta property="og:title"       content="أساس مهني | حاسبة معدل BTEC" />
    <meta property="og:description" content="احسب معدل BTEC بدقة للأول ثانوي والتوجيهي — منصة أساس التعليمية." />
    <meta property="og:image"       content="%VITE_SITE_URL%/logo.png" />
    <meta property="og:locale"      content="ar_JO" />
    <meta property="og:site_name"   content="منصة أساس التعليمية" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="أساس مهني | حاسبة معدل BTEC" />
    <meta name="twitter:description" content="احسب معدل BTEC بدقة للأول ثانوي والتوجيهي." />
    <meta name="twitter:image"       content="%VITE_SITE_URL%/logo.png" />

    <!-- PWA / iOS / Android -->
    <meta name="theme-color" content="#2F5673" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="أساس مهني" />
    <!-- %BASE_URL% is Vite's built-in base path placeholder (resolved at build time) -->
    <link rel="apple-touch-icon" href="%BASE_URL%logo.png" />
    <link rel="manifest" href="%BASE_URL%manifest.json" />

    <!-- Favicon -->
    <link rel="icon" href="%BASE_URL%logo.png" />
    <!--
      Google Fonts — loaded NON-BLOCKING.
      Strategy: media="print" + onload swap trick.
      This means the font is fetched in the background; the page renders
      immediately using the system font fallback, then switches to Cairo
      once it arrives. If fonts.googleapis.com is blocked or unreachable
      (common on certain ISPs/networks), the page still loads instantly.

      We use dns-prefetch instead of preconnect: preconnect opens a real
      TCP+TLS connection and can hang for 20-30 s on networks that drop
      packets silently to Google servers, delaying page paint.
    -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
      onerror="this.remove()"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <style>
      /* ── System font fallback if Cairo fails to load ── */
      body {
        margin: 0;
        background: #EEF3F7;
        font-family: 'Cairo', 'Segoe UI', Tahoma, Arial, sans-serif;
      }

      /* ── Full-screen loader shown before JS mounts ── */
      #app-loader {
        position: fixed;
        top: 0; right: 0; bottom: 0; left: 0;
        display: -webkit-flex;
        display: flex;
        -webkit-flex-direction: column;
        flex-direction: column;
        -webkit-align-items: center;
        align-items: center;
        -webkit-justify-content: center;
        justify-content: center;
        background: #EEF3F7;
        font-family: 'Cairo', 'Segoe UI', Tahoma, Arial, sans-serif;
        direction: rtl;
        text-align: center;
        z-index: 9999;
        padding: 24px;
        -webkit-box-sizing: border-box;
        box-sizing: border-box;
      }

      #app-loader .loader-circle {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(47, 86, 115, 0.18);
        border-top-color: #2F5673;
        border-radius: 50%;
        -webkit-animation: appSpin 0.9s linear infinite;
        animation: appSpin 0.9s linear infinite;
        margin-bottom: 16px;
        -webkit-box-sizing: border-box;
        box-sizing: border-box;
      }

      #app-loader .loader-text {
        color: #4A6170;
        font-size: 15px;
        margin: 0 0 8px 0;
      }

      #app-loader .loader-sub {
        color: #7A95A6;
        font-size: 12px;
        margin: 0;
      }

      /* Error state shown after timeout */
      #app-loader.load-error .loader-circle {
        display: none;
      }

      #app-loader.load-error .loader-text {
        font-size: 17px;
        font-weight: 700;
        color: #1A2D3E;
        margin-bottom: 10px;
      }

      #app-loader .retry-btn {
        margin-top: 18px;
        background: #2F5673;
        color: #fff;
        border: none;
        border-radius: 999px;
        padding: 12px 28px;
        font-size: 14px;
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
        display: none;
      }

      #app-loader.load-error .retry-btn {
        display: inline-block;
      }

      @-webkit-keyframes appSpin {
        to { -webkit-transform: rotate(360deg); transform: rotate(360deg); }
      }
      @keyframes appSpin {
        to { -webkit-transform: rotate(360deg); transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>

    <!-- No-JS fallback -->
    <noscript>
      <div style="position:fixed;top:0;right:0;bottom:0;left:0;background:#EEF3F7;display:flex;align-items:center;justify-content:center;direction:rtl;text-align:center;padding:24px;font-family:Arial,sans-serif;z-index:99999;">
        <div style="background:#fff;border-radius:16px;padding:32px 24px;max-width:360px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,0.1);">
          <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
          <h2 style="font-size:18px;color:#1A2D3E;margin:0 0 12px;">JavaScript غير مفعّل</h2>
          <p style="font-size:13px;color:#4A6170;margin:0;">
            هذا التطبيق يحتاج إلى JavaScript ليعمل.<br/>
            يرجى تفعيل JavaScript في إعدادات متصفحك وإعادة تحميل الصفحة.
          </p>
        </div>
      </div>
    </noscript>

    <!-- Loading indicator — visible before React mounts -->
    <div id="app-loader">
      <div class="loader-circle"></div>
      <p class="loader-text">جارٍ تحميل التطبيق...</p>
      <p class="loader-sub">يرجى الانتظار</p>
      <button class="retry-btn" onclick="window.location.reload()">إعادة المحاولة</button>
    </div>

    <div id="root"></div>

    <script>
      // ── Helpers exposed to the app ──────────────────────────────
      window.__removeLoader = function() {
        var el = document.getElementById('app-loader');
        if (el && el.parentNode) {
          el.parentNode.removeChild(el);
        }
      };

      // ── Timeout: if app hasn't mounted after 20s, show error ────
      var __loadTimer = setTimeout(function() {
        var root = document.getElementById('root');
        var loader = document.getElementById('app-loader');
        // Only show error if root is still empty (React never mounted)
        if (loader && root && !root.firstChild) {
          loader.className = 'load-error';
          var text = loader.querySelector('.loader-text');
          var sub  = loader.querySelector('.loader-sub');
          if (text) text.textContent = 'تعذّر تحميل التطبيق';
          if (sub)  sub.textContent  = 'تحقق من اتصالك بالإنترنت ثم أعد المحاولة';
        }
      }, 20000);

      // If app loads successfully, cancel the error timer
      window.__cancelLoadTimer = function() {
        clearTimeout(__loadTimer);
      };

      // ── Global error handler (catches JS errors before React) ───
      window.onerror = function(msg, src, line, col, err) {
        var loader = document.getElementById('app-loader');
        var root   = document.getElementById('root');
        // Only take over if React hasn't mounted yet
        if (loader && root && !root.firstChild) {
          clearTimeout(__loadTimer);
          loader.className = 'load-error';
          var text = loader.querySelector('.loader-text');
          var sub  = loader.querySelector('.loader-sub');
          if (text) text.textContent = 'حدث خطأ أثناء تحميل التطبيق';
          if (sub)  sub.textContent  = 'قد لا يدعم متصفحك هذا التطبيق. جرّب تحديث متصفحك.';
        }
      };

      // ── Catch unhandled Promise rejections (network/fetch errors) ─
      window.addEventListener('unhandledrejection', function(event) {
        var loader = document.getElementById('app-loader');
        var root   = document.getElementById('root');
        if (loader && root && !root.firstChild) {
          clearTimeout(__loadTimer);
          loader.className = 'load-error';
          var text = loader.querySelector('.loader-text');
          var sub  = loader.querySelector('.loader-sub');
          if (text) text.textContent = 'تعذّر تحميل التطبيق';
          if (sub)  sub.textContent  = 'تحقق من اتصالك بالإنترنت ثم أعد المحاولة';
        }
      });
    </script>

    <!-- Main app entry (injected by Vite) -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
